apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: customer-keycloak
  namespace: keycloak-demo
spec:
  source:
    type: Git
    git:
      uri: https://github.com/summu1985/keycloak-demo.git
      ref: demo-no-enrichment
    contextDir: extensions

  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile

  resources:
    requests:
      cpu: 250m
      memory: 1Gi
      ephemeral-storage: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
      ephemeral-storage: 4Gi

  output:
    to:
      kind: ImageStreamTag
      name: customer-keycloak:latest