apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-enrichment-api-code
  namespace: keycloak-demo
data:
  server.py: |
    import json
    from http.server import BaseHTTPRequestHandler, HTTPServer

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/health":
                payload = json.dumps({"status": "UP"}).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(payload)))
                self.end_headers()
                self.wfile.write(payload)
                return
            self.send_response(404)
            self.end_headers()

        def do_POST(self):
            if self.path != "/enrich":
                self.send_response(404)
                self.end_headers()
                return

            length = int(self.headers.get("Content-Length", "0"))
            body = self.rfile.read(length)
            try:
                request = json.loads(body or b"{}")
            except json.JSONDecodeError:
                self.send_response(400)
                self.end_headers()
                return

            userid = request.get("userid")
            user_type = request.get("userType")
            roles = request.get("roles") or []

            response = {
                "userid": userid,
                "userType": user_type,
                "roles": roles,
                "customKey": "customValue",
                "enrichmentApplied": True
            }

            print(
                "ENRICHMENT REQUEST -> "
                f"userid={userid} userType={user_type} roles={roles}",
                flush=True
            )
            print(
                "ENRICHMENT RESPONSE -> " + json.dumps(response, separators=(",", ":")),
                flush=True
            )

            payload = json.dumps(response).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(payload)))
            self.end_headers()
            self.wfile.write(payload)

        def log_message(self, fmt, *args):
            return

    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-enrichment-api
  namespace: keycloak-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-enrichment-api
  template:
    metadata:
      labels:
        app: mock-enrichment-api
    spec:
      containers:
        - name: api
          image: registry.access.redhat.com/ubi9/python-311:latest
          command: ["python3", "/opt/app/server.py"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: code
              mountPath: /opt/app
      volumes:
        - name: code
          configMap:
            name: mock-enrichment-api-code
---
apiVersion: v1
kind: Service
metadata:
  name: mock-enrichment-api
  namespace: keycloak-demo
spec:
  selector:
    app: mock-enrichment-api
  ports:
    - name: http
      port: 8080
      targetPort: http
