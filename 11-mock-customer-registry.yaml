apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-customer-registry-code
  namespace: keycloak-demo
data:
  server.py: |
    import json
    from http.server import BaseHTTPRequestHandler, HTTPServer

    CUSTOMERS = {
        "9876543210": {
            "registered": True,
            "active": True,
            "customerId": "CUST-100245",
            "userType": "customer",
            "roles": ["policy_viewer", "claim_submitter"]
        },
        "9876500000": {
            "registered": True,
            "active": False,
            "customerId": "CUST-100246",
            "userType": "customer",
            "roles": ["policy_viewer"]
        }
    }

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            prefix = "/customers/by-mobile/"
            if not self.path.startswith(prefix):
                self.send_response(404)
                self.end_headers()
                return
            mobile = self.path[len(prefix):].split("?", 1)[0]
            record = CUSTOMERS.get(mobile, {
                "registered": False,
                "active": False,
                "roles": []
            })
            print(f"CUSTOMER LOOKUP -> mobile={mobile} registered={record['registered']} active={record['active']}", flush=True)
            payload = json.dumps(record).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(payload)))
            self.end_headers()
            self.wfile.write(payload)

        def log_message(self, fmt, *args):
            return

    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-customer-registry
  namespace: keycloak-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-customer-registry
  template:
    metadata:
      labels:
        app: mock-customer-registry
    spec:
      containers:
        - name: api
          image: registry.access.redhat.com/ubi9/python-311:latest
          command: ["python3", "/opt/app/server.py"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
          volumeMounts:
            - name: code
              mountPath: /opt/app
      volumes:
        - name: code
          configMap:
            name: mock-customer-registry-code
---
apiVersion: v1
kind: Service
metadata:
  name: mock-customer-registry
  namespace: keycloak-demo
spec:
  selector:
    app: mock-customer-registry
  ports:
    - name: http
      port: 8080
      targetPort: http
