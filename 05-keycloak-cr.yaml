apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: customer-iam
  namespace: keycloak-demo
spec:
  instances: 2
  db:
    vendor: postgres
    host: keycloak-db
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  hostname:
    hostname: customer-iam-keycloak-demo.apps.<cluster-domain>
  http:
    httpEnabled: true
  additionalOptions:
    - name: proxy-headers
      value: xforwarded
    - name: hostname-strict
      value: "false"
