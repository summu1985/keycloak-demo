apiVersion: v1
kind: ConfigMap
metadata:
  name: token-enrichment-api-code
  namespace: keycloak-demo
data:
  app.py: |
    import json
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from urllib.parse import urlparse, parse_qs
    class H(BaseHTTPRequestHandler):
      def do_GET(self):
        q=parse_qs(urlparse(self.path).query); u=q.get('username',['unknown'])[0]
        body=json.dumps({'userId':'EMP-'+u.upper(),'userType':'employee','roles':['employee_user','employee_portal_access']}).encode()
        self.send_response(200); self.send_header('Content-Type','application/json'); self.send_header('Content-Length',str(len(body))); self.end_headers(); self.wfile.write(body)
    HTTPServer(('0.0.0.0',8080),H).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: token-enrichment-api
  namespace: keycloak-demo
spec:
  replicas: 1
  selector:
    matchLabels: {app: token-enrichment-api}
  template:
    metadata:
      labels: {app: token-enrichment-api}
    spec:
      containers:
        - name: api
          image: registry.access.redhat.com/ubi9/python-312
          command: [python3, /opt/app/app.py]
          ports: [{containerPort: 8080}]
          volumeMounts: [{name: code, mountPath: /opt/app}]
      volumes: [{name: code, configMap: {name: token-enrichment-api-code}}]
---
apiVersion: v1
kind: Service
metadata:
  name: token-enrichment-api
  namespace: keycloak-demo
spec:
  selector: {app: token-enrichment-api}
  ports: [{port: 8080, targetPort: 8080}]
